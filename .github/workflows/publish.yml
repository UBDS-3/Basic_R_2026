name: Publish Maps Gallery

on:
  push:
    branches: [students]
    paths:
      - "maps/**"
      - "index.qmd"
      - "_quarto.yml"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize gh-pages branch if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            git switch --orphan gh-pages
            git commit --allow-empty -m "chore: init gh-pages"
            git push origin gh-pages
            git switch main
          fi

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install R packages used in maps
        shell: Rscript {0}
        run: |
          files <- list.files("maps", pattern = "\\.qmd$", full.names = TRUE, recursive = TRUE)
          lines <- unlist(lapply(files, readLines, warn = FALSE))
          pkgs  <- regmatches(lines, regexpr("(?<=library\\()[^)]+", lines, perl = TRUE))
          pkgs  <- unique(trimws(pkgs[nchar(pkgs) > 0]))
          if (length(pkgs)) install.packages(pkgs)

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
