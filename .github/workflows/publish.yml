name: Publish Maps Gallery

on:
  push:
    branches: [students]
    paths:
      - "maps/**"
      - "index.qmd"
      - "_quarto.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install R packages used in maps
        shell: Rscript {0}
        run: |
          files <- list.files("maps", pattern = "\\.qmd$", full.names = TRUE, recursive = TRUE)
          lines <- unlist(lapply(files, readLines, warn = FALSE))
          pkgs  <- regmatches(lines, regexpr("(?<=library\\()[^)]+", lines, perl = TRUE))
          pkgs  <- unique(trimws(pkgs[nchar(pkgs) > 0]))
          if (length(pkgs)) install.packages(pkgs)

      - uses: quarto-dev/quarto-actions/render@v2

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
