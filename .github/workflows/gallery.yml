name: Build Gallery

on:
  push:
    branches: [students]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          python3 - <<'EOF'
          import os, re

          slugs = sorted(
              f[:-5] for f in os.listdir("maps")
              if f.endswith(".html")
          )

          def title(slug):
              return re.sub(r"^\d+-", "", slug).replace("-", " ").replace("_", " ").title()

          cards = "\n".join(
              f'<a class="card" href="maps/{s}.html" target="_blank">'
              f'<iframe src="maps/{s}.html" loading="lazy" tabindex="-1"></iframe>'
              f'<p>{title(s)}</p></a>'
              for s in slugs
          )

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Maps Gallery</title>
            <style>
              *{{box-sizing:border-box;margin:0;padding:0}}
              body{{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8}}
              header{{background:linear-gradient(135deg,#1a365d,#2b6cb0);color:#fff;padding:2.5rem 2rem;text-align:center}}
              header h1{{font-size:2rem;font-weight:700}}
              .grid{{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;max-width:1200px;margin:2rem auto;padding:0 1.5rem}}
              .card{{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);text-decoration:none;color:#1a365d;transition:transform .18s,box-shadow .18s}}
              .card:hover{{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.14)}}
              .card iframe{{width:200%;height:200%;border:none;pointer-events:none;transform:scale(.5);transform-origin:0 0;display:block}}
              .card>div{{height:200px;overflow:hidden}}
              .card p{{padding:.8rem 1rem;font-weight:600;font-size:.95rem}}
            </style>
          </head>
          <body>
          <header><h1>🗺️ Maps Gallery</h1></header>
          <div class="grid">{cards}</div>
          </body></html>"""

          with open("index.html", "w") as f:
              f.write(html)
          print(f"Built index.html — {len(slugs)} map(s)")
          EOF

      - name: Commit index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: rebuild gallery"
          git push
